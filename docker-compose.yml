services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rai-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-rai}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity:
    build:
      context: .
      dockerfile: docker/Dockerfile.identity
    ports:
      - "5100:5100"
    environment:
      ASPNETCORE_URLS: http://+:5100
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Identity: >-
        Host=postgres;Database=${POSTGRES_DB:-rai};
        Username=${POSTGRES_USER:-rai};Password=${POSTGRES_PASSWORD:-rai-dev-password}
      Identity__Issuer: http://localhost:5100
      Oidc__CrmClientSecret: ${Oidc__CrmClientSecret:-crm-secret-change-in-prod}
      Oidc__TicketingClientSecret: ${Oidc__TicketingClientSecret:-ticketing-secret-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  hub:
    build:
      context: .
      dockerfile: docker/Dockerfile.hub
    ports:
      - "5200:5200"
    environment:
      ASPNETCORE_URLS: http://+:5200
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Hub: >-
        Host=postgres;Database=${POSTGRES_DB:-rai};
        Username=${POSTGRES_USER:-rai};Password=${POSTGRES_PASSWORD:-rai-dev-password}
      Hub__InboundHmacSecret: ${Hub__InboundHmacSecret:-shared-hmac-secret-change-in-prod}
      Hub__OutboundHmacSecret: ${Hub__OutboundHmacSecret:-shared-hmac-secret-change-in-prod}
      Hub__TicketingWebhookUrl: http://ticketing:5400/api/webhooks/crm-contact-created
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5200/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  crm:
    build:
      context: .
      dockerfile: docker/Dockerfile.crm
    ports:
      - "5300:5300"
    environment:
      ASPNETCORE_URLS: http://+:5300
      ASPNETCORE_ENVIRONMENT: Production
      # host.docker.internal resolves to the Docker host on macOS; metadata fetched here
      # returns issuer=http://localhost:5100 (fixed via Identity:Issuer), so token
      # validation passes even though the browser used localhost:5100 for auth.
      Oidc__Authority: http://host.docker.internal:5100
      Oidc__CrmClientSecret: ${Oidc__CrmClientSecret:-crm-secret-change-in-prod}
      Crm__HmacSecret: ${Crm__HmacSecret:-shared-hmac-secret-change-in-prod}
      Crm__HubWebhookUrl: http://hub:5200/api/webhooks/crm
    depends_on:
      identity:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5300/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ticketing:
    build:
      context: .
      dockerfile: docker/Dockerfile.ticketing
    ports:
      - "5400:5400"
    environment:
      ASPNETCORE_URLS: http://+:5400
      ASPNETCORE_ENVIRONMENT: Production
      Oidc__Authority: http://host.docker.internal:5100
      Oidc__TicketingClientSecret: ${Oidc__TicketingClientSecret:-ticketing-secret-change-in-prod}
      Ticketing__HmacSecret: ${Ticketing__HmacSecret:-shared-hmac-secret-change-in-prod}
    depends_on:
      identity:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5400/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  spa:
    build:
      context: .
      dockerfile: docker/Dockerfile.spa
      args:
        VITE_IDENTITY_URL: http://localhost:5100
    ports:
      - "5173:5173"
    depends_on:
      identity:
        condition: service_healthy

volumes:
  postgres-data:
